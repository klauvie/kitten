<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kočičí Myšlenkotrap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #FFF8DC 0%, #FF8C42 50%, #2C2C2C 100%);
            animation: gradientShift 8s ease infinite;
            background-size: 200% 200%;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .container {
            background: linear-gradient(to bottom, 
                #FFFFFF 0%, 
                #FF9966 35%, 
                #FF6633 50%, 
                #000000 85%, 
                #333333 100%);
            border-radius: 50px;
            padding: 60px 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            border: 8px solid #FF6633;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 20%;
            width: 30px;
            height: 30px;
            background: #FF9966;
            border-radius: 50%;
            opacity: 0.6;
        }

        .container::after {
            content: '';
            position: absolute;
            top: 15px;
            right: 20%;
            width: 35px;
            height: 35px;
            background: #000;
            border-radius: 50%;
            opacity: 0.6;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        h1 {
            color: #2C2C2C;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.3);
            font-style: italic;
        }

        .subtitle {
            color: #333;
            font-size: 1.1em;
            font-weight: bold;
            margin-top: 5px;
        }

        .cat-face-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 30px auto;
            cursor: pointer;
            font-size: 150px;
            line-height: 150px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .cat-face-container:hover {
            transform: scale(1.1);
        }

        .cat-face-container:active {
            transform: scale(0.95);
        }

        .fortune-box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .game-container {
            min-height: 120px;
        }

        .game-input-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        #guessInput {
            padding: 15px 20px;
            font-size: 1.1em;
            border: 3px solid #FF6633;
            border-radius: 15px;
            width: 80%;
            max-width: 400px;
            background: white;
            color: #2C2C2C;
            transition: all 0.3s ease;
            text-align: center;
        }

        #guessInput:focus {
            outline: none;
            border-color: #FF9966;
            box-shadow: 0 0 10px rgba(255, 102, 51, 0.3);
            background: #FFFACD;
        }

        #guessInput::placeholder {
            color: #999;
        }

        .game-stats {
            text-align: center;
            color: #FF6633;
            font-weight: bold;
            font-size: 1.1em;
            margin: 15px 0;
        }

        .fortune-text {
            color: #2C2C2C;
            font-size: 1.3em;
            text-align: center;
            font-weight: bold;
            line-height: 1.6;
            font-style: italic;
        }

        .button-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        button {
            background: linear-gradient(135deg, #FF6633, #FF9966);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #FF9966, #FFAA77);
        }

        button:active {
            transform: translateY(-1px);
        }

        .button-reset {
            background: linear-gradient(135deg, #2C2C2C, #555);
        }

        .button-reset:hover {
            background: linear-gradient(135deg, #555, #777);
        }

        .paw-print {
            position: absolute;
            opacity: 0.1;
            font-size: 4em;
            pointer-events: none;
        }

        .paw1 { top: 20px; right: 30px; }
        .paw2 { bottom: 30px; left: 20px; }

        .loading {
            display: inline-block;
            animation: spin 1s infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .initial-text {
            color: #999;
        }

        .magic-orb-container {
            display: none;
        }

        .magic-orb {
            display: none;
        }

        .orb-glow {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="paw-print paw1">🐾</div>
        <div class="paw-print paw2">🐾</div>

        <div class="header">
            <h1>🐱 Kočičí Myšlenkotrap 🐱</h1>
            <p class="subtitle">Kočka si myslí věc - můžeš ji uhodnout?</p>
        </div>

        <div class="cat-face-container">
            🐱
        </div>

        <div class="fortune-box game-container">
            <div class="fortune-text" id="fortune">
                Kočka si myslí na něco... Začni hádat! 🤔
            </div>
        </div>

        <div class="game-input-container">
            <input 
                type="text" 
                id="guessInput" 
                placeholder="Napiš své hádání..." 
                onkeypress="if(event.key === 'Enter') makeGuess()"
                autocomplete="off"
            />
        </div>

        <div class="game-stats">
            <span id="attempts">Pokusů: 0</span>
        </div>

        <div class="button-container">
            <button onclick="makeGuess()">Hádat! 🎯</button>
            <button class="button-reset" onclick="startNewGame()">Nová hra ↻</button>
        </div>
    </div>

    <script>
        // Seznam věcí, na které si kočka myslí
        const things = [
            { word: "myš", category: "zvíře", similar: ["hlodavec", "potkan", "krysa"], hint: "💡 Máji dlouhý ocas a jsou malé..." },
            { word: "pták", category: "zvíře", similar: ["peří", "křídla", "létat"], hint: "💡 Tvor se skořápkou na těle..." },
            { word: "ryba", category: "zvíře", similar: ["voda", "ploutve", "šupiny"], hint: "💡 Bez něho se topíš..." },
            { word: "slunce", category: "příroda", similar: ["hvězda", "teplo", "světlo"], hint: "💡 Největší balónek na obloze..." },
            { word: "měsíc", category: "příroda", similar: ["hvězda", "noc", "svit"], hint: "💡 Změňuje se každý den, ale vždycky se vrací..." },
            { word: "tráva", category: "příroda", similar: ["zelená", "zahrada", "louka"], hint: "💡 Kočka si v ní ráda hraje..." },
            { word: "strom", category: "příroda", similar: ["dřevo", "listy", "les"], hint: "💡 Má vrstvy a po kterých se dá lézt..." },
            { word: "voda", category: "příroda", similar: ["tekutina", "moře", "pití"], hint: "💡 Kočka ji nesnáší, ale bez ní nemůžeš..." },
            { word: "oheň", category: "příroda", similar: ["teplý", "nebezpečný", "plameny"], hint: "💡 Svítí a kouská..." },
            { word: "snění", category: "pojem", similar: ["představa", "fantasy", "noční"], hint: "💡 Vidiš věci, které nejsou pravdivé..." },
            { word: "hraní", category: "činnost", similar: ["zábava", "hra", "veselí"], hint: "💡 Děláš to v parku bez cíle..." },
            { word: "spaní", category: "činnost", similar: ["odpočinek", "postel", "noc"], hint: "💡 Oči se zavírají a čas letí..." },
            { word: "jídlo", category: "věc", similar: ["jíst", "chutné", "hlad"], hint: "💡 Potřebuješ to, když slýcháš vaše břicho..." },
            { word: "postel", category: "věc", similar: ["spaní", "pohodlí", "nábytek"], hint: "💡 Měkko, pohodlně, kde se cítíš bezpečně..." },
            { word: "hračka", category: "věc", similar: ["hraní", "zábava", "hrát"], hint: "💡 Věc, kterou chceš, kterou ztratíš, kterou hledáš..." },
            { word: "kniha", category: "věc", similar: ["čtení", "papír", "příběh"], hint: "💡 Přátel se skrývá v tenkých listech..." },
            { word: "barva", category: "pojem", similar: ["zbarvit", "odstín", "spektrum"], hint: "💡 Všechno to má, někdo více, někdo méně..." },
            { word: "zvuk", category: "pojem", similar: ["slyšet", "hluk", "hudba"], hint: "💡 Víc než vidíš, slyšíš..." },
            { word: "láska", category: "pojem", similar: ["cítit", "srdce", "pocit"], hint: "💡 Nejsilnější věc, kterou necítíš rukama..." },
            { word: "strach", category: "pojem", similar: ["nebezpečí", "obava", "hrůza"], hint: "💡 Cítíš to v hlubinách, když je tma..." }
        ];

        let currentThing = null;
        let attempts = 0;
        let gameWon = false;

        function startNewGame() {
            // Vyber náhodnou věc
            currentThing = things[Math.floor(Math.random() * things.length)];
            attempts = 0;
            gameWon = false;
            document.getElementById('guessInput').value = '';
            document.getElementById('guessInput').disabled = false;
            document.getElementById('fortune').textContent = 'Kočka si myslí na něco... Začni hádat! 🤔';
            document.getElementById('attempts').textContent = 'Pokusů: 0';
        }

        function levenshteinDistance(str1, str2) {
            const len1 = str1.length;
            const len2 = str2.length;
            const matrix = Array(len2 + 1).fill(null).map(() => Array(len1 + 1).fill(0));

            for (let i = 0; i <= len1; i++) matrix[0][i] = i;
            for (let j = 0; j <= len2; j++) matrix[j][0] = j;

            for (let j = 1; j <= len2; j++) {
                for (let i = 1; i <= len1; i++) {
                    const indicator = str1[i - 1] === str2[j - 1] ? 0 : 1;
                    matrix[j][i] = Math.min(
                        matrix[j][i - 1] + 1,
                        matrix[j - 1][i] + 1,
                        matrix[j - 1][i - 1] + indicator
                    );
                }
            }
            return matrix[len2][len1];
        }

        function makeGuess() {
            if (gameWon) return;

            const input = document.getElementById('guessInput').value.trim().toLowerCase();
            if (!input) return;

            attempts++;
            const fortuneElement = document.getElementById('fortune');
            const target = currentThing.word.toLowerCase();

            // Přesná shoda
            if (input === target) {
                gameWon = true;
                fortuneElement.textContent = `🎉 SPRÁVNĚ! Měla jsem na mysli "${currentThing.word}"! Gratuluji ti! 🐱`;
                document.getElementById('guessInput').disabled = true;
                document.getElementById('attempts').textContent = `Pokusů: ${attempts} - Vítězství!`;
                return;
            }

            // Kontrola podobných slov
            if (currentThing.similar.includes(input)) {
                fortuneElement.textContent = `⭐ Blízko! Myslíš na něco podobného, ale to to není... 🤔`;
                document.getElementById('guessInput').value = '';
                document.getElementById('attempts').textContent = `Pokusů: ${attempts}`;
                return;
            }

            // Levenshteinova vzdálenost pro podobnost
            const distance = levenshteinDistance(input, target);
            if (distance <= 2) {
                fortuneElement.textContent = `✨ Velmi blízko! Jsi na správné cestě! 🐾`;
                document.getElementById('guessInput').value = '';
                document.getElementById('attempts').textContent = `Pokusů: ${attempts}`;
                return;
            }

            // Špatně - zobraz nápovědu
            fortuneElement.innerHTML = `❌ Ne, to není správně! Zkus znovu! 😸<br/><span style="font-size: 0.9em; color: #FF6633; margin-top: 10px; display: block;">${currentThing.hint}</span>`;
            document.getElementById('guessInput').value = '';
            document.getElementById('attempts').textContent = `Pokusů: ${attempts}`;
        }

        // Spusti novou hru při načtení
        window.addEventListener('load', startNewGame);
    </script>
</body>
</html>
